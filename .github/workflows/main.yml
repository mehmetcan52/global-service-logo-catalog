name: Auto Update Subscription Catalog

on:
  schedule:
    - cron: '0 0 * * 1' # Her Pazartesi saat 00:00'da otomatik çalışır
  workflow_dispatch: 

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Repoya dosya yazma ve commit izni
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --local user.name "SubscriptionBot"
          git config --local user.email "bot@subscriptionsensei.com"
          git add .
          # Sadece değişiklik varsa commit at, yoksa hata vermeden geç
          git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 Auto-update: Catalog & Logos" && git push)
